name: Wake Streamlit Apps

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  wake_apps:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        group: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run wake script for group ${{ matrix.group }}
        run: |
          echo "Running wake_apps.py for group ${{ matrix.group }}"
          python wake_apps.py ${{ matrix.group }}
