name: Wake Important Streamlit Apps

on:
  schedule:
    # Every 2 hours (tune as you like)
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  wake_important_apps:
    runs-on: ubuntu-latest
    env:
      # Opt in to Node 24 for JS-based actions (future-proofing)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run wake script (important apps)
        run: |
          echo "Running wake_apps.py for IMPORTANT_APPS"
          python wake_apps.py
